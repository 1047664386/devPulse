# ==============================================
# 前端容器内部专用 Nginx 配置文件
# 仅作用：托管 Vite 打包后的 SPA 单页静态资源
# 访问链路：公网用户 → 外层网关Nginx → 本容器Nginx（外网无法直连本服务）
# 解决核心痛点：history路由刷新页面404、静态资源长期缓存、传输压缩
# ==============================================
server {
    # 监听容器内部80端口，仅Docker内网网关可访问，不对外暴露公网端口
    listen 80;
    # 匹配任意域名，不需要手动填写业务域名，网关转发过来什么域名都能正常处理
    server_name _;
    # 网站根目录：容器内存放前端打包dist产物的路径
    root /usr/share/nginx/html;
    # 默认首页文件，请求路径指向文件夹时自动读取index.html
    index index.html;

    # -------------------------- Gzip 传输压缩配置 --------------------------
    # 开启gzip压缩，减小js/css/html/svg等文本资源体积，降低带宽、提升加载速度
    gzip on;
    # 告诉浏览器：不同Accept-Encoding客户端需要分别缓存压缩/未压缩资源
    gzip_vary on;
    # 对代理过来的请求也启用压缩（当前是网关转发场景，必须开启）
    gzip_proxied any;
    # 文件小于256字节不压缩，压缩本身会产生额外开销，小文件没必要
    gzip_min_length 256;
    # 指定需要压缩的文件MIME类型，图片/字体二进制文件无需压缩
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # -------------------------- /assets 哈希静态资源缓存规则 --------------------------
    # Vite打包后 assets 下的js/css/图片文件名自带哈希（如app.abc123.js）
    # 文件内容不变哈希永远不变，因此可以设置超长浏览器缓存
    location /assets/ {
        # 浏览器本地缓存有效期1年，期间不会重复请求服务器
        expires 1y;
        # 缓存策略：公开缓存、文件永久不变，客户端无需校验服务端更新
        add_header Cache-Control "public, immutable";
        # 资源文件不存在时直接返回404，不兜底跳转index.html
        try_files $uri =404;
    }

    # -------------------------- SPA 核心兜底规则（解决刷新404） --------------------------
    # 所有未匹配到的路径统一进入该location
    # 例如 /dashboard /user/123 这类前端虚拟路由，服务器不存在对应文件
    location / {
        # try_files 执行顺序：
        # 1. $uri：尝试寻找路径对应的真实文件，如/dashboard
        # 2. $uri/：尝试寻找同名文件夹 /dashboard/
        # 3. /index.html：上面两者都找不到，兜底返回首页HTML
        # 浏览器拿到index.html后加载前端JS，自动读取地址栏路由渲染对应页面，消除404
        try_files $uri $uri/ /index.html;
    }
}