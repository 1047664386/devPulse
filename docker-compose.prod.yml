# ── DevPulse 生产环境 Docker Compose ──
# 用法：
#   1. 复制 .env.example 为 .env，修改所有密码和密钥
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. docker compose -f docker-compose.prod.yml exec api npx prisma migrate deploy
#   4. docker compose -f docker-compose.prod.yml exec api npx tsx prisma/seed.ts

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-devpulse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devpulse-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    networks:
      - devpulse-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devpulse-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devpulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devpulse}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      API_PORT: 3000
      API_PREFIX: api/v1
      FRONTEND_URL: ${FRONTEND_URL:-https://your-domain.com}
      APP_URL: ${APP_URL:-}
      UPLOAD_DIR: /app/apps/api/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-2097152}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@devpulse.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@devpulse.com}
    volumes:
      - uploads_data:/app/apps/api/uploads
    networks:
      - devpulse-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
      # 多核服务器取消注释，开多个 API 实例，Nginx 自动负载均衡
      # replicas: 2

  # ─── Frontend (Nginx 静态服务)────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: devpulse-web
    restart: unless-stopped
    networks:
      - devpulse-net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ─── Nginx 反向代理 ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: devpulse-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      # HTTPS（正式环境取消注释）
      # - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/data/uploads:ro
      # HTTPS 证书（正式环境取消注释）
      # - ./docker/certs:/etc/letsencrypt:ro
    networks:
      - devpulse-net
    depends_on:
      - api
      - web
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  devpulse-net:
    driver: bridge
