# ── DevPulse 生产 Nginx 反向代理配置 ──
# 放在 docker/nginx/nginx.conf 或 /etc/nginx/conf.d/devpulse.conf
#
# 架构：
#   客户端 → Nginx (80/443)
#              ├─ /            → web:80      (前端 SPA 静态文件)
#              ├─ /api/*       → api:3000    (NestJS 后端接口)
#              └─ /uploads/*   → 本地 uploads 目录 (静态文件，不经 Node.js)

upstream nestjs_backend {
    server api:3000;
    # 多实例部署时取消注释并添加更多 server
    # server api:3001;
    # server api:3002;
}

server {
    listen 80;
    server_name your-domain.com;

    # ── HTTP → HTTPS 强制跳转（正式环境取消注释）──
    # return 301 https://$server_name$request_uri;

    # ── 安全头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 请求体大小限制（与后端 MAX_FILE_SIZE 一致）──
    client_max_body_size 5m;

    # ── Gzip 压缩 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml;

    # ── 上传文件静态服务（直接从磁盘读取，不经 Node.js）──
    location /uploads/ {
        alias /data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # 文件不存在时返回 404
        try_files $uri =404;
    }

    # ── 后端 API 反向代理 ──
    location /api/ {
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        # WebSocket 支持（未来通知推送预留）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Swagger 文档（生产环境可注释掉禁用）──
    # location /api/docs {
    #     return 404;
    # }

    # ── 前端静态文件 ──
    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

