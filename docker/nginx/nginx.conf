# ── DevPulse 生产 Nginx 反向代理配置 ──
# 放在 docker/nginx/nginx.conf 或 /etc/nginx/conf.d/devpulse.conf
#
# 架构：
#   客户端 → Nginx (80/443)
#              ├─ /            → web:80      (前端 SPA 静态文件)
#              ├─ /api/*       → api:3000    (NestJS 后端接口)
#              └─ /uploads/*   → 本地 uploads 目录 (静态文件，不经 Node.js)

# ── DevPulse 生产环境 Nginx 网关反向代理完整配置 ──
# 文件存放路径：docker/nginx/nginx.conf
# 整体请求流转架构说明：
# 客户端浏览器公网请求 → 当前Nginx网关（对外暴露80/443端口）
# 1. /uploads/* 路径：读取网关容器内 /data/uploads 静态资源（用户上传图片/附件），不经过NestJS后端
# 2. /api/* 路径：反向代理转发至 upstream 定义的NestJS接口服务集群，处理所有业务接口
# 3. / 根路径：转发前端SPA容器 web:80，由前端内置Nginx处理页面、路由、打包静态资源
# 补充说明：采用两层Nginx架构，外层网关负责接入、安全、压缩、转发；内层前端Nginx专门处理SPA页面兜底逻辑

# 定义NestJS后端接口服务集群，统一管理接口服务地址，方便后续扩容多实例做负载均衡
upstream nestjs_backend {
    # Docker Compose 内部服务名api，容器网络DNS自动解析，当前单实例接口服务
    server api:3000;
    # 业务流量增大、需要多实例高可用扩容时，取消下方两行注释，实现请求轮询分发
    # server api:3001;
    # server api:3002;
}

# ====================== 80端口 HTTP 明文服务配置 ======================
server {
    # 监听宿主机80端口，接收未加密HTTP请求
    listen 80;
    # server_name _ Nginx通用通配写法：匹配所有Host请求头，支持IP、任意域名访问，避免多server块路由错乱
    server_name _;

    # ── HTTP 请求强制301永久重定向到HTTPS（线上正式环境取消注释开启，全站加密）──
    # return 301 https://$server_name$request_uri;

    # ── 全局通用安全响应头，全站所有接口、页面、错误页面统一加固防护 ──
    # always 参数：无论200/404/500等任何HTTP状态码，都强制携带该头部，消除安全漏洞缺口
    # 禁止本站页面被第三方网站iframe嵌入，防御点击劫持攻击
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 关闭浏览器MIME类型自动嗅探，强制以服务端返回的Content-Type解析文件，防止文件伪装XSS漏洞
    add_header X-Content-Type-Options "nosniff" always;
    # 开启浏览器内置XSS过滤，检测到恶意脚本直接阻断页面渲染
    add_header X-XSS-Protection "1; mode=block" always;
    # 控制跨页面跳转时Referer来源信息泄露，保护用户隐私，减少跨站信息泄露风险
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 限制客户端单次请求最大上传文件体积，数值必须和NestJS后端上传配置MAX_FILE_SIZE保持一致 ──
    client_max_body_size 5m;

    # ── 全局Gzip文本资源压缩配置，减小网络传输体积，提升页面、接口加载速度 ──
    gzip on;                                  # gzip压缩总开关，开启压缩功能
    gzip_vary on;                             # 自动添加Vary: Accept-Encoding响应头，区分压缩/未压缩缓存，避免低版本浏览器页面乱码
    gzip_proxied any;                         # 允许对所有反向代理转发后的资源（前端页面、接口JSON）启用压缩，两层Nginx架构必备配置
    gzip_min_length 256;                      # 文件小于256字节不执行压缩，避免压缩CPU开销大于流量节省收益
    # 指定需要压缩的文本类资源MIME类型；jpg/png/视频/字体等二进制文件本身已压缩，无需加入
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml;

    # ====================== 匹配/uploads/路径：用户上传静态资源独立服务 ======================
    location /uploads/ {
        # 路径别名映射：访问域名/uploads/ 等价读取容器内 /data/uploads/ 目录下的文件
        alias /data/uploads/;
        expires 30d;                          # 设置浏览器本地缓存有效期30天，减少重复请求
        add_header Cache-Control "public, immutable"; # public允许CDN/公共代理缓存；immutable缓存期内刷新页面不向服务端校验资源
        access_log off;                       # 静态文件下载不记录访问日志，减少磁盘IO占用

        # 资源文件不存在时直接返回404状态码，不走SPA首页兜底逻辑
        try_files $uri =404;
    }

    # ====================== 匹配/api/路径：所有后端业务接口反向代理转发 ======================
    # SSE 长连接需要单独配置：禁用缓冲、延长超时，确保实时推送不被 Nginx 缓存
    location /api/v1/notifications/stream {
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        # SSE 关键配置：禁用代理缓冲，确保数据立即推送给客户端
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # SSE 长连接超时：心跳 30s，这里设 60s 留余量
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        # 将/api/开头的请求转发至上方upstream定义的NestJS后端集群
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;                # 使用HTTP1.1协议，支持长连接与WebSocket协议升级
        # 透传客户端原始访问信息给NestJS后端，后端可读取用于日志、限流、跨域、链接生成
        proxy_set_header Host $host;                        # 传递用户真实访问域名
        proxy_set_header X-Real-IP $remote_addr;            # 传递直接连接Nginx的客户端真实公网IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 完整记录整条代理链路IP，多层代理/CDN场景必备
        proxy_set_header X-Forwarded-Proto $scheme;         # 传递当前请求协议http/https，后端拼接跳转链接不会出现混合内容报错
        proxy_set_header X-Request-Id $request_id;          # 全局唯一请求追踪ID，网关、NestJS日志统一标识，线上故障排查专用

        # WebSocket长连接升级配置，预留实时消息、站内通知、聊天推送功能
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 接口请求超时控制，防止慢查询长时间占用连接资源
        proxy_connect_timeout 10s;             # 网关建立与后端服务连接的超时时间
        proxy_send_timeout 30s;                # 网关向后端发送请求数据的超时时间
        proxy_read_timeout 30s;                # 网关读取后端返回业务数据的超时时间
    }

    # ── Swagger接口文档路由屏蔽配置，生产环境取消注释即可关闭线上调试接口文档 ──
    # location /api/docs {
    #     return 404;
    # }

    # ====================== 匹配根路径/：前端SPA页面、路由、静态资源转发 ======================
    location / {
        # 所有未匹配/api、/uploads的路径，全部转发前端web容器内置Nginx处理SPA页面兜底
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        # 透传客户端域名、真实IP信息给到前端容器
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

