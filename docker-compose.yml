# ── Production baseline ──
# Dev usage:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Prod usage: docker compose up -d (DB/Redis ports NOT exposed to host)

services:
  postgres:
    image: postgres:16-alpine
    container_name: devpulse-study-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devpulse_study}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}       # No fallback — must be injected
      POSTGRES_DB: ${POSTGRES_DB:-devpulse_study}
    volumes:
      - postgres_study_data:/var/lib/postgresql/data
    networks:
      - devpulse-study-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devpulse_study}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devpulse-study-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_study_data:/data
    networks:
      - devpulse-study-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 本地 SMTP 捕获工具（开发环境专用）
  # 捕获所有发出的邮件，不真实投递，打开 http://localhost:8025 可查看邮件
  mailpit:
    image: axllent/mailpit:latest
    container_name: devpulse-study-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP 接收端口
      - "${MAILPIT_UI_PORT:-8025}:8025"     # Web UI 查看端口
    networks:
      - devpulse-study-net

volumes:
  postgres_study_data:
  redis_study_data:

networks:
  devpulse-study-net:
    driver: bridge