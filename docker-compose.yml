# ── Production baseline ──
# Dev usage:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Prod usage: docker compose up -d (DB/Redis ports NOT exposed to host)

services:
  postgres:
    image: postgres:16-alpine
    container_name: devpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}       # No fallback — must be injected
      POSTGRES_DB: ${POSTGRES_DB:-devpulse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devpulse-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - devpulse-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  devpulse-net:
    driver: bridge
